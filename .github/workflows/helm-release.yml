name: helm-release

# Publishes Helm charts found under charts/* using two complementary channels:
#
#   1. HTTPS repository on GitHub Pages, packaged & indexed by chart-releaser.
#      Users add it with:
#        helm repo add bitdefender-gz https://<owner>.github.io/<repo>
#
#   2. OCI artefact pushed to GHCR alongside the container image.
#      Users pull it with:
#        helm install gz oci://ghcr.io/<owner>/<repo>/charts/bitdefender-gz-connector --version <X.Y.Z>
#
# Releases are cut by bumping `version` in charts/<chart>/Chart.yaml and
# pushing to the default branch. chart-releaser detects the new version,
# packages it, creates a GitHub Release with the .tgz attached, and publishes
# the updated repo index to gh-pages.

on:
  push:
    branches: [main, master]
    paths:
      - 'charts/**'
      - '.github/workflows/helm-release.yml'
  workflow_dispatch:

permissions:
  contents: write     # chart-releaser creates Releases & pushes to gh-pages
  packages: write     # OCI push to GHCR
  id-token: write     # cosign keyless signing of chart artefacts

concurrency:
  group: helm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Package, release & push chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      # --------------------------------------------------------------- #
      # Channel 1 — gh-pages HTTP repository via chart-releaser         #
      # --------------------------------------------------------------- #
      - name: Run chart-releaser
        id: cr
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          mark_as_latest: true
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------------- #
      # Channel 2 — OCI artefact in GHCR                                #
      # --------------------------------------------------------------- #
      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package & push charts to GHCR (OCI)
        id: oci
        env:
          OWNER_LC: ${{ github.repository_owner }}
          REPO_LC:  ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          mkdir -p .cr-release-packages-oci

          OWNER_LC_LOWER=$(echo "${OWNER_LC}" | tr '[:upper:]' '[:lower:]')
          REPO_LC_LOWER=$(echo "${REPO_LC}" | tr '[:upper:]' '[:lower:]')
          # Helm push/pull use the oci:// scheme; cosign uses bare registry refs.
          HELM_REGISTRY="oci://ghcr.io/${OWNER_LC_LOWER}/${REPO_LC_LOWER}/charts"
          PLAIN_REGISTRY="ghcr.io/${OWNER_LC_LOWER}/${REPO_LC_LOWER}/charts"

          # "ref@digest" entries — passed to the sign step
          pushed=()

          for chart in charts/*/; do
            chart_name=$(helm show chart "${chart}" | awk '/^name:/    {print $2}')
            chart_ver=$(helm  show chart "${chart}" | awk '/^version:/ {print $2}')
            tarball=".cr-release-packages-oci/${chart_name}-${chart_ver}.tgz"

            if helm pull "${HELM_REGISTRY}/${chart_name}" --version "${chart_ver}" --destination /tmp >/dev/null 2>&1; then
              echo "::notice::OCI chart ${chart_name}@${chart_ver} already exists, skipping push."
              continue
            fi

            helm package "${chart}" --destination .cr-release-packages-oci

            # Capture the digest printed by `helm push` so cosign can sign by
            # digest (more secure than signing by tag).
            push_out=$(helm push "${tarball}" "${HELM_REGISTRY}" 2>&1)
            echo "${push_out}"
            digest=$(echo "${push_out}" | awk '/^Digest:/ {print $2}')

            if [[ -n "${digest}" ]]; then
              pushed+=("${PLAIN_REGISTRY}/${chart_name}@${digest}")
            else
              # Fallback to tag-based ref if helm push did not print a digest.
              pushed+=("${PLAIN_REGISTRY}/${chart_name}:${chart_ver}")
            fi
          done

          {
            echo "pushed<<EOF"
            printf '%s\n' "${pushed[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # --------------------------------------------------------------- #
      # Sign OCI chart artefacts (keyless cosign, Sigstore transparency) #
      # --------------------------------------------------------------- #
      - name: Install cosign
        if: steps.oci.outputs.pushed != ''
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign OCI chart artefacts
        if: steps.oci.outputs.pushed != ''
        run: |
          set -euo pipefail
          # refs are already bare registry references (no oci:// prefix),
          # optionally with @sha256:<digest> for digest-pinned signing.
          while IFS= read -r ref; do
            [[ -z "${ref}" ]] && continue
            echo "Signing ${ref}"
            cosign sign --yes "${ref}"
          done <<< "${{ steps.oci.outputs.pushed }}"
