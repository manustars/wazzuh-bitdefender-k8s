name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------- #
  # Dockerfile lint                                                         #
  # ----------------------------------------------------------------------- #
  hadolint:
    name: Lint Dockerfile (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: docker/Dockerfile
          ignore: DL3008,DL3015

  # ----------------------------------------------------------------------- #
  # Shellcheck for entrypoint                                               #
  # ----------------------------------------------------------------------- #
  shellcheck:
    name: Lint entrypoint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./docker

  # ----------------------------------------------------------------------- #
  # Helm chart lint + template + kubeconform                                #
  # ----------------------------------------------------------------------- #
  helm-lint:
    name: Lint & template Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.3

      - name: Set up Python (chart-testing dependency)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch "${{ github.event.repository.default_branch }}" --chart-dirs charts)
          if [[ -n "${changed}" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        run: ct lint --target-branch "${{ github.event.repository.default_branch }}" --chart-dirs charts --validate-maintainers=false

      - name: Helm template (smoke render)
        run: |
          for chart in charts/*/; do
            echo "::group::helm template ${chart}"
            helm template smoke "${chart}" \
              --set auth.value="Basic ZHVtbXk6ZHVtbXk=" \
              --set syslog.target="wazuh-manager.wazuh.svc.cluster.local"
            echo "::endgroup::"
          done

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Validate rendered manifests against Kubernetes 1.30 schemas
        run: |
          for chart in charts/*/; do
            echo "::group::kubeconform ${chart}"
            helm template smoke "${chart}" \
              --set auth.value="Basic ZHVtbXk6ZHVtbXk=" \
              --set syslog.target="wazuh-manager.wazuh.svc.cluster.local" \
              | kubeconform \
                  -strict \
                  -summary \
                  -kubernetes-version 1.30.0 \
                  -schema-location default \
                  -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
            echo "::endgroup::"
          done
