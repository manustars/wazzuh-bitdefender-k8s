{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "bdgz.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "bdgz.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "bdgz.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- with .Values.networkPolicy.from }}
        {{- toYaml . | nindent 8 }}
        {{- else }}
        []
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.connector.port }}
  egress:
    # DNS to kube-dns
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Syslog destination (the Wazuh manager). We only know the target by
    # FQDN so we authorise the whole cluster; tighten with a podSelector if
    # your Wazuh manager runs in-cluster with known labels.
    - to: []
      ports:
        - protocol: {{ ternary "TCP" "UDP" (eq .Values.syslog.transport "Tcp") }}
          port: {{ .Values.syslog.port }}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
